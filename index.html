<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro · Crie sua conta</title>
    <style>
        body {
            font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
            background: #f3f5f9;
            margin: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }
        form {
            background: white;
            border-radius: 1.5rem;
            box-shadow: 0 12px 30px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 700px;
        }
        fieldset {
            border: none;
            padding: 2rem 2rem 2.2rem;
            margin: 0;
        }
        legend {
            font-size: 1.8rem;
            font-weight: 600;
            color: #1e2b4f;
            padding: 0 0 0.25rem 0;
            border-bottom: 3px solid #e0e7ff;
            width: 100%;
            margin-bottom: 1.8rem;
            letter-spacing: -0.02em;
        }
        .campo {
            margin-bottom: 1.5rem;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
        }
        label {
            flex: 0 0 120px;
            font-weight: 500;
            color: #1e293b;
        }
        input:not([type="radio"]):not([type="checkbox"]), textarea {
            flex: 1 1 300px;
            padding: 0.75rem 1rem;
            border: 1px solid #cbd5e1;
            border-radius: 16px;
            font-size: 1rem;
            transition: 0.15s;
            background: #fafdff;
            font-family: inherit;
        }
        input:focus, textarea:focus {
            outline: none;
            border-color: #4f6af5;
            box-shadow: 0 0 0 3px rgba(79, 106, 245, 0.2);
            background: white;
        }
        .grupo-genero {
            margin: 0.5rem 0 1rem 0;
            width: 100%;
        }
        .titulo-genero {
            font-weight: 700;
            color: #1e293b;
            display: block;
            margin-bottom: 0.75rem;
            font-size: 1.1rem;
        }
        .radio-wrapper {
            display: flex;
            flex-wrap: wrap;
            gap: 2rem;
            margin-left: 0.5rem;
        }
        .radio-item {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .radio-item input[type="radio"] {
            width: 1.2rem;
            height: 1.2rem;
            accent-color: #4f6af5;
            margin: 0;
        }
        .termos-wrapper {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            margin: 2rem 0 2rem 0;
            flex-wrap: wrap;
        }
        .termos-wrapper input[type="checkbox"] {
            width: 1.3rem;
            height: 1.3rem;
            accent-color: #4f6af5;
            margin: 0;
        }
        .termos-wrapper label {
            flex: auto;
            font-weight: 400;
            color: #334155;
        }
        button {
            background: #1e2b4f;
            border: none;
            color: white;
            font-weight: 600;
            font-size: 1.2rem;
            padding: 1rem 2rem;
            border-radius: 40px;
            width: 100%;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
            letter-spacing: 0.3px;
            margin-top: 0.5rem;
            border: 1px solid #14203b;
        }
        button:hover {
            background: #2e3f6e;
        }
        button:active {
            transform: scale(0.98);
        }
        textarea {
            resize: vertical;
            min-height: 100px;
        }
        /* pequeno ajuste para alinhar labels com textarea */
        .campo-textarea label {
            align-self: flex-start;
            margin-top: 0.8rem;
        }
        .required-star {
            color: #d43f3f;
            font-size: 1.2rem;
            margin-left: 2px;
        }
        .dica {
            font-size: 0.85rem;
            color: #5f6c86;
            margin-left: 125px;
            margin-top: 0.2rem;
        }
        hr {
            border: 1px dashed #d9e2ef;
            margin: 1.2rem 0;
        }
    </style>
</head>
<body>
    <form action="#" method="post">
        <fieldset>
            <legend>Crie sua Conta</legend>

            <div class="campo">
                <label for="nome">Nome completo</label>
                <input type="text" id="nome" name="nome" placeholder="Como gostaria de ser chamado" autocomplete="name">
            </div>

            <div class="campo">
                <label for="email">E-mail <span class="required-star" aria-hidden="true">*</span></label>
                <input type="email" id="email" name="email" placeholder="voce@exemplo.com" required autocomplete="email">
            </div>
            <div class="dica">Usaremos este e-mail para confirmação</div>

            <div class="campo">
                <label for="senha">Senha <span class="required-star" aria-hidden="true">*</span></label>
                <input type="password" id="senha" name="senha" minlength="8" placeholder="Mínimo 8 caracteres" required autocomplete="new-password">
            </div>
            <div class="dica">mínimo de 8 caracteres</div>
            <div class="grupo-genero">
                <span class="titulo-genero" id="genero-titulo"><strong>Gênero</strong></span>
                <div class="radio-wrapper" role="radiogroup" aria-labelledby="genero-titulo">
                    <div class="radio-item">
                        <input type="radio" id="genero-masc" name="genero" value="masculino">
                        <label for="genero-masc">Masculino</label>
                    </div>
                    <div class="radio-item">
                        <input type="radio" id="genero-fem" name="genero" value="feminino">
                        <label for="genero-fem">Feminino</label>
                    </div>
                </div>
            </div>

            <div class="campo campo-textarea">
                <label for="biografia">Biografia</label>
                <textarea id="biografia" name="biografia" rows="4" placeholder="Conte um pouco sobre você, seus interesses, ou o que achar relevante."></textarea>
            </div>

            <div class="termos-wrapper">
                <input type="checkbox" id="termos" name="termos" required>
                <label for="termos">Eu li e concordo com os <strong>Termos de Uso</strong> e com a <strong>Política de Privacidade</strong>. <span class="required-star" aria-hidden="true">*</span></label>
            </div>

            <button type="submit">Criar conta</button>
            <p style="font-size:0.85rem; color:#67758e; margin-top: 1.5rem; text-align:center;">
                <span class="required-star" aria-hidden="true">*</span> Campos obrigatórios
            </p>
        </fieldset>
    </form>

    <p style="position: absolute; left: -9999px;" role="status" aria-live="polite">Formulário de cadastro carregado. Todos os campos obrigatórios estão indicados com asterisco.</p>
</body>
</html>
